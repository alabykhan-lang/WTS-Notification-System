name: Validate Notification System
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check application
        run: |
          test -s index.html
          test -s styles.css
          test -s config.js
          test -s api.js
          test -s app.js
          test -s bulk.js
          test -s manifest.webmanifest
          test -s vercel.json
          node --check config.js
          node --check api.js
          node --check app.js
          node --check bulk.js
          grep -q 'WTS Notification System' index.html
          grep -q 'school_notification_control_read_api' api.js
          grep -q 'school_notification_control_write_api' api.js
          if grep -RIn -E 'SUPABASE_SERVICE_ROLE_KEY|service_role_key|sb_secret_|WTS_WHATSAPP_GATEWAY_TOKEN' . --exclude-dir=.git; then exit 1; fi
